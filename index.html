<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

  <title>Neon Nexus: Bullet-Time Brick Breaker — Free Browser Game</title>
  <meta name="description" content="Play Neon Nexus free — a neon brick breaker with Nexus slow-mo, 27 power-ups, elemental balls, Jardinain creatures, and infinite procedural levels. Works in your browser, no download."/>
  <meta name="keywords" content="brick breaker, arkanoid, bullet time, slow motion, neon game, browser game, free game, Phaser game, Jardinains, arcade, paddle game"/>
  <meta name="author" content="Tuhin Karmakar"/>
  <meta name="application-name" content="Neon Nexus"/>
  <meta name="robots" content="index, follow, max-image-preview:large"/>
  <meta name="googlebot" content="index, follow"/>

  <!-- SEO:CANONICAL -->

  <!-- Open Graph (Facebook, Discord, iMessage, LinkedIn) -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="Neon Nexus"/>
  <meta property="og:locale" content="en_US"/>
  <meta property="og:title" content="Neon Nexus: Bullet-Time Brick Breaker"/>
  <meta property="og:description" content="Neon brick breaker with Nexus slow-mo, 27 power-ups, elemental balls, and infinite procedural levels. Play free in your browser."/>
  <!-- SEO:OG_URL -->
  <meta property="og:image" content="%OG_IMAGE%"/>
  <meta property="og:image:alt" content="Neon Nexus — twilight garden brick breaker with golden neon glow"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:type" content="image/png"/>

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Neon Nexus: Bullet-Time Brick Breaker"/>
  <meta name="twitter:description" content="Free neon brick breaker with bullet-time slow-mo, 27 power-ups, and Jardinain siege. Play in your browser."/>
  <meta name="twitter:image" content="%OG_IMAGE%"/>
  <meta name="twitter:image:alt" content="Neon Nexus game preview — neon brick breaker"/>

  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#120818"/>
  <meta name="color-scheme" content="dark"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Neon Nexus"/>

  <link rel="icon" type="image/png" sizes="32x32" href="./icons/android/android-launchericon-48-48.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/android/android-launchericon-192-192.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/android/android-launchericon-192-192.png"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Neon Nexus: Bullet-Time Brick Breaker",
    "alternateName": "Neon Nexus",
    "description": "A neon brick breaker with Nexus slow-mo, 27 power-ups, elemental balls, Jardinain creatures, and infinite procedural levels.",
    "url": "<!-- SEO:JSON_URL -->",
    "image": "%OG_IMAGE%",
    "applicationCategory": "Game",
    "gamePlatform": ["Web browser", "Android", "iOS"],
    "operatingSystem": "Any",
    "playMode": "SinglePlayer",
    "genre": ["Arcade", "Action"],
    "inLanguage": "en",
    "isAccessibleForFree": true,
    "author": {
      "@type": "Person",
      "name": "Tuhin Karmakar"
    },
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD",
      "availability": "https://schema.org/InStock"
    }
  }
  </script>

  <style>
    :root {
      --accent: #e8b86d;
      --bg: #08050c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      position: fixed; inset: 0;
      overflow: hidden;
      background: var(--bg);
      color: #fafafa;
      font-family: 'Orbitron', 'Major Mono Display', monospace;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      overscroll-behavior: none;
    }
    #game-root {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-root canvas {
      display: block;
      touch-action: none;
      margin: 0 auto;
    }
    #boot-splash {
      position: fixed; inset: 0; z-index: 10;
      display: grid; place-items: center;
      background:
        radial-gradient(circle at 50% 35%, #2a1838 0%, #120818 55%, #08050c 100%);
      transition: opacity .6s ease;
    }
    #boot-splash.hide { opacity: 0; pointer-events: none; }
    #boot-splash .title {
      font-weight: 900; font-size: clamp(1.4rem, 5vw, 3rem);
      letter-spacing: .08em; text-align: center; line-height: 1.3;
      color: var(--accent);
      text-shadow: 0 0 18px var(--accent), 0 0 44px rgba(232,184,109,.45);
      animation: pulse 1.6s ease-in-out infinite alternate;
    }
    #boot-splash .sub { margin-top: 1rem; opacity: .6; font-size: .8rem; letter-spacing: .3em; }
    @keyframes pulse { from { opacity: .65; } to { opacity: 1; } }
    #ad-banner {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 50px;
      z-index: 5;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 5, 12, 0.92);
      border-top: 1px solid rgba(232, 184, 109, 0.12);
      font-family: Orbitron, monospace;
      user-select: none;
      pointer-events: none;
    }
    #ad-banner[data-adsense="1"] { border-top-color: rgba(232, 184, 109, 0.25); }
    #ad-banner.visible { display: flex; }
    #ad-banner ins.adsbygoogle { border: none; pointer-events: auto; }
    #ad-banner .ad-banner-placeholder {
      font-size: 9px;
      letter-spacing: 0.32em;
      color: rgba(110, 128, 152, 0.38);
      text-transform: uppercase;
    }
    .seo-fallback {
      max-width: 40rem;
      margin: 2rem auto;
      padding: 1.5rem;
      line-height: 1.6;
      text-align: center;
    }
    .seo-fallback h1 { font-size: 1.25rem; color: var(--accent); margin-bottom: 0.75rem; }
    .seo-fallback p { opacity: 0.75; font-size: 0.85rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <noscript>
    <div class="seo-fallback">
      <h1>Neon Nexus: Bullet-Time Brick Breaker</h1>
      <p>Free neon brick breaker with Nexus slow-mo, 27 power-ups, elemental balls, Jardinain creatures, and infinite procedural levels.</p>
      <p>Enable JavaScript to play in your browser — no download required.</p>
    </div>
  </noscript>

  <main id="game-root" aria-label="Neon Nexus game canvas"></main>
  <div id="ad-banner" aria-hidden="true"><!-- AdSense / demo banner injected by ad provider --></div>

  <div id="boot-splash" aria-hidden="true">
    <div>
      <div class="title">NEON NEXUS<br/>BULLET-TIME</div>
      <div class="sub">LOADING…</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
