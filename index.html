<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Neon Nexus: Bullet-Time Brick Breaker</title>
  <meta name="description" content="A visually-stunning, cross-platform neon brick breaker with bullet-time and 23 power-ups."/>
  <meta name="author" content="Tuhin Karmakar"/>

  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#120818"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <link rel="icon" href="./icons/ios/32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/ios/180.png"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet">

  <style>
    :root {
      --accent: #e8b86d;
      --bg: #08050c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      position: fixed; inset: 0;
      overflow: hidden;
      background: var(--bg);
      color: #fafafa;
      font-family: 'Orbitron', 'Major Mono Display', monospace;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      overscroll-behavior: none;
    }
    #game-root {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-root canvas {
      display: block;
      touch-action: none;
      margin: 0 auto;
    }
    #boot-splash {
      position: fixed; inset: 0; z-index: 10;
      display: grid; place-items: center;
      background:
        radial-gradient(circle at 50% 35%, #2a1838 0%, #120818 55%, #08050c 100%);
      transition: opacity .6s ease;
    }
    #boot-splash.hide { opacity: 0; pointer-events: none; }
    #boot-splash .title {
      font-weight: 900; font-size: clamp(1.4rem, 5vw, 3rem);
      letter-spacing: .08em; text-align: center; line-height: 1.3;
      color: var(--accent);
      text-shadow: 0 0 18px var(--accent), 0 0 44px rgba(232,184,109,.45);
      animation: pulse 1.6s ease-in-out infinite alternate;
    }
    #boot-splash .sub { margin-top: 1rem; opacity: .6; font-size: .8rem; letter-spacing: .3em; }
    @keyframes pulse { from { opacity: .65; } to { opacity: 1; } }
    #ad-banner {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 50px;
      z-index: 5;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 5, 12, 0.92);
      border-top: 1px solid rgba(232, 184, 109, 0.12);
      font-family: Orbitron, monospace;
      user-select: none;
      pointer-events: none;
    }
    #ad-banner[data-adsense="1"] { border-top-color: rgba(232, 184, 109, 0.25); }
    #ad-banner.visible { display: flex; }
    #ad-banner ins.adsbygoogle { border: none; pointer-events: auto; }
    #ad-banner .ad-banner-placeholder {
      font-size: 9px;
      letter-spacing: 0.32em;
      color: rgba(110, 128, 152, 0.38);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="game-root"></div>
  <div id="ad-banner" aria-hidden="true"><!-- AdSense / demo banner injected by ad provider --></div>

  <div id="boot-splash">
    <div>
      <div class="title">NEON NEXUS<br/>BULLET-TIME</div>
      <div class="sub">LOADING…</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
