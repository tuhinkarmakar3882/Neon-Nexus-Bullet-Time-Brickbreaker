# Neon Nexus — Next.js static export (output: "out")
# https://nextjs.org/docs/app/building-your-application/deploying/static-exports

[build]
  command = "pnpm install && pnpm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Stripe IAP (serverless) — same paths as Vercel /api
[[redirects]]
  from = "/api/fulfill-session"
  to = "/.netlify/functions/fulfill-session"
  status = 200

[[redirects]]
  from = "/api/redeem-unlock"
  to = "/.netlify/functions/redeem-unlock"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# App routes use trailing slashes (next.config.mjs trailingSlash: true)
[[redirects]]
  from = "/play"
  to = "/play/"
  status = 301

[[redirects]]
  from = "/codex"
  to = "/codex/"
  status = 301

[[redirects]]
  from = "/shop"
  to = "/shop/"
  status = 301

[[redirects]]
  from = "/settings"
  to = "/settings/"
  status = 301

[[redirects]]
  from = "/share"
  to = "/share/"
  status = 301

[[redirects]]
  from = "/connect"
  to = "/connect/"
  status = 301

[[redirects]]
  from = "/install"
  to = "/install/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw-precache.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/app-ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"
